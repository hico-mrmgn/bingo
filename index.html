<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ビンゴ抽選マシン</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="stage">
    <section class="main-panel">
      <header class="header">
        <h1 class="title">BINGO</h1>
        <div class="header-right">
          <div class="counter">
            <span id="drawn-count">0</span> / 75　残り <span id="remaining-count">75</span>
          </div>
          <a class="page-nav" href="lottery/index.html">🎁 景品クジ</a>
        </div>
      </header>

      <div class="drum" id="drum">
        <span class="drum-letter" id="drum-letter">&nbsp;</span>
        <span class="drum-number" id="drum-number">--</span>
      </div>
      <div class="recent" id="recent" aria-label="直近の番号"></div>
      <div class="controls">
        <button type="button" class="draw-button" id="draw-button">抽選する</button>
        <button type="button" class="sound-button" id="sound-button" aria-pressed="true">🔊 効果音 ON</button>
        <button type="button" class="reset-button" id="reset-button">リセット</button>
      </div>
      <p class="hint">スペースキーでも抽選できます</p>
    </section>

    <aside class="board" id="board" aria-label="抽選済み番号ボード"></aside>
  </main>

  <script src="sound-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
